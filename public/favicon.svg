<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#1a8a4a"/>
  <!-- header row -->
  <rect x="0" y="0" width="32" height="9" rx="6" fill="#157a3f"/>
  <rect x="0" y="4" width="32" height="5" fill="#157a3f"/>
  <!-- column dividers -->
  <line x1="11" y1="0" x2="11" y2="32" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="21" y1="0" x2="21" y2="32" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <!-- row dividers -->
  <line x1="0" y1="9"  x2="32" y2="9"  stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="0" y1="17" x2="32" y2="17" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="0" y1="25" x2="32" y2="25" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <!-- cell content hints (small bars suggesting data) -->
  <rect x="3"  y="12" width="5" height="2" rx="0.5" fill="white" opacity="0.5"/>
  <rect x="13" y="12" width="5" height="2" rx="0.5" fill="white" opacity="0.5"/>
  <rect x="23" y="12" width="6" height="2" rx="0.5" fill="white" opacity="0.35"/>
  <rect x="3"  y="20" width="4" height="2" rx="0.5" fill="white" opacity="0.5"/>
  <rect x="13" y="20" width="6" height="2" rx="0.5" fill="white" opacity="0.5"/>
  <rect x="23" y="20" width="5" height="2" rx="0.5" fill="white" opacity="0.35"/>
  <rect x="3"  y="28" width="6" height="2" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="13" y="28" width="4" height="2" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="23" y="28" width="5" height="2" rx="0.5" fill="white" opacity="0.3"/>
</svg>
